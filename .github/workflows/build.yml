name: Build and Release

on:
  push:
    tags:
      - 'v*'   # Triggered on tags like v1.0.0
  workflow_dispatch:  # Allow manual triggering

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact_name: AutoNetGuard.exe
            asset_name: AutoNetGuard-windows.exe
          - os: macos-latest
            artifact_name: AutoNetGuard
            asset_name: AutoNetGuard-macos
          - os: ubuntu-latest
            artifact_name: AutoNetGuard
            asset_name: AutoNetGuard-linux

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            python3-tk \
            libgirepository1.0-dev \
            gir1.2-gtk-3.0 \
            gir1.2-appindicator3-0.1 \
            libappindicator3-dev

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Build with PyInstaller
        run: python build.py

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: dist/${{ matrix.artifact_name }}

      - name: Upload config template (Linux only)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: config-template
          path: dist/config.ini.example

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    # Only run when triggered by a tag push
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Rename artifacts for release
        run: |
          mkdir -p release_assets
          cp "artifacts/AutoNetGuard-windows.exe/AutoNetGuard.exe"  release_assets/AutoNetGuard-windows.exe
          cp "artifacts/AutoNetGuard-macos/AutoNetGuard"             release_assets/AutoNetGuard-macos
          cp "artifacts/AutoNetGuard-linux/AutoNetGuard"             release_assets/AutoNetGuard-linux
          cp "artifacts/config-template/config.ini.example"         release_assets/config.ini.example

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release_assets/*
          generate_release_notes: true
